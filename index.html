<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTU Uploader Pro</title>
    <link rel="icon" href="logoo.png" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff; --secondary: #3a7bd5; --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7); --input-bg: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.1); --danger: #ef4444; --success: #10b981; --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: none; -webkit-user-select: none; user-select: none; }
        *::-webkit-scrollbar { display: none; }

        html, body { 
            height: 100vh; width: 100vw; overflow: hidden; 
            font-family: 'JetBrains Mono', monospace;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: white; display: flex; justify-content: center; align-items: center;
        }

        .container {
            background: var(--card-bg); backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 20px;
            padding: clamp(15px, 3vh, 30px); width: 98%; max-width: 1400px; height: 95vh;
            display: flex; flex-direction: column; gap: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { color: var(--primary); font-size: clamp(1.2rem, 1.5vw, 1.5rem); text-transform: uppercase; letter-spacing: 1px; text-align: center; }

        .main-content { display: grid; grid-template-columns: 350px 1fr; gap: 20px; flex: 1; min-height: 0; }

        /* Left Panel */
        .left-panel { display: flex; flex-direction: column; gap: 15px; }
        .config-box { background: var(--input-bg); padding: 15px; border-radius: 15px; border: 1px solid var(--border); }
        label { display: block; font-size: 0.7rem; color: var(--primary); margin-bottom: 8px; font-weight: bold; }
        input[type="text"] {
            width: 100%; background: rgba(15, 23, 42, 0.8); border: 1px solid #334155;
            padding: 12px; border-radius: 10px; color: white; outline: none; font-size: 0.9rem;
        }

        /* Vùng Kéo Thả File Cao Cấp */
        .drop-zone {
            border: 2px dashed #334155; border-radius: 15px; padding: 25px 15px;
            text-align: center; cursor: pointer; background: rgba(255,255,255,0.01);
            transition: all 0.3s ease; display: flex; flex-direction: column; gap: 10px;
        }
        .drop-zone.dragover { border-color: var(--primary); background: rgba(0, 210, 255, 0.08); transform: scale(1.02); }
        .drop-zone span { font-size: 0.75rem; color: #94a3b8; }
        .drop-zone b { font-size: 0.85rem; color: var(--primary); text-transform: uppercase; }

        .upload-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .mini-btn {
            background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border);
            padding: 10px; border-radius: 8px; font-size: 0.7rem; color: white;
            cursor: pointer; text-align: center; font-weight: bold; transition: 0.2s;
        }
        .mini-btn:hover { border-color: var(--primary); color: var(--primary); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; text-align: center; }
        .stat-item { background: rgba(0,0,0,0.2); padding: 8px; border-radius: 10px; font-size: 0.7rem; }
        .stat-item b { display: block; color: var(--primary); font-size: 1rem; }

        /* Right Panel */
        .right-panel {
            background: rgba(0, 0, 0, 0.2); border-radius: 15px; border: 1px solid var(--border);
            display: flex; flex-direction: column; min-height: 0;
        }
        .file-list-header { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 0.75rem; color: var(--primary); font-weight: bold; }
        #fileList { flex: 1; overflow-y: auto; padding: 10px; }
        
        /* Giao diện dòng File có thêm Trạng thái */
        .file-row {
            display: grid; grid-template-columns: auto 1fr auto auto; align-items: center;
            padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.75rem; gap: 12px; transition: background 0.2s;
        }
        .file-row.uploading { background: rgba(245, 158, 11, 0.05); }
        .file-row.success { background: rgba(16, 185, 129, 0.05); }
        
        .status-badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .status-wait { color: #64748b; background: rgba(100, 116, 139, 0.1); }
        .status-run { color: var(--warning); background: rgba(245, 158, 11, 0.1); }
        .status-done { color: var(--success); background: rgba(16, 185, 129, 0.1); }

        .new-name-text { color: #cbd5e1; word-break: break-all; text-align: right; font-weight: 500; }
        .btn-delete { color: var(--danger); cursor: pointer; font-weight: bold; padding: 2px 6px; }

        /* Actions area */
        .bottom-area { display: flex; flex-direction: column; gap: 10px; }
        .btn-main {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            color: white; font-weight: 700; cursor: pointer; font-size: 0.9rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-main:disabled { background: #334155 !important; color: #64748b; cursor: not-allowed; background-image: none !important; }
        .btn-storage {
            width: 100%; padding: 12px; border: 1px solid var(--primary); border-radius: 12px;
            color: var(--primary); font-weight: 700; cursor: pointer; font-size: 0.8rem;
            background: transparent; text-align: center; text-decoration: none;
            transition: 0.3s; text-transform: uppercase; display: block;
        }
        .btn-storage:hover { background: var(--primary); color: white; }

        .progress-bar { height: 6px; background: #334155; border-radius: 3px; overflow: hidden; display: none; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); transition: 0.2s; }

        @media (max-width: 850px) {
            .container { height: 98vh; padding: 15px; }
            .main-content { grid-template-columns: 1fr; overflow-y: auto; display: block; }
            .left-panel { margin-bottom: 15px; }
            .right-panel { min-height: 300px; }
            body { overflow-y: auto; height: auto; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Telegram Uploader</h1>

    <div class="main-content">
        <div class="left-panel">
            <div class="config-box">
                <label>MÃ MÔN HỌC (VD: ENG 258)</label>
                <input type="text" id="subjectCode" placeholder="Nhập mã môn..." oninput="normalizeInput(this)" autocomplete="off">
            </div>

            <!-- Vùng Kéo Thả Tiện Ích -->
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <b>📁 Kéo thả tài liệu vào đây</b>
                <span>Hoặc click trực tiếp để chọn file</span>
                <div class="upload-options" onclick="event.stopPropagation()">
                    <div class="mini-btn" onclick="document.getElementById('fileInput').click()">Chọn File</div>
                    <div class="mini-btn" onclick="document.getElementById('folderInput').click()">Chọn Thư Mục</div>
                </div>
                <input type="file" id="fileInput" multiple style="display:none" onchange="processFiles(this.files)">
                <input type="file" id="folderInput" webkitdirectory directory style="display:none" onchange="processFiles(this.files)">
            </div>

            <div class="stats-grid">
                <div class="stat-item"><b id="sTotal">0</b>Tệp</div>
                <div class="stat-item"><b id="sImg">0</b>Ảnh</div>
                <div class="stat-item"><b id="sVid">0</b>Video</div>
                <div class="stat-item"><b id="sDoc">0</b>Khác</div>
            </div>
            
            <div class="bottom-area">
                <div class="progress-bar" id="pBar"><div class="progress-fill" id="pFill"></div></div>
                <button id="sendBtn" class="btn-main" onclick="startUpload()" disabled>GỬI DỮ LIỆU</button>
                <a href="https://t.me/Dai_Hoc_Duy_Tan" class="btn-storage" target="_blank">📚 Kênh</a>
            </div>
        </div>

        <div class="right-panel">
            <div class="file-list-header">DANH SÁCH FILE CHỜ GỬI</div>
            <div id="fileList">
                <p style="text-align:center; color:#94a3b8; font-size:0.7rem; margin-top:50px;">Chưa có tệp nào</p>
            </div>
        </div>
    </div>
</div>

<script>
    const BOT_TOKEN = "8792491525:AAGI641V9a83gMUi47isyqtMLq2gc3RHi4U";
    const TARGET_IDS = [
      "-1003770539054",
      "-1003194062731"
    ];
    
    let filesArray = [];

    // Kích hoạt tính năng kéo thả Drag & Drop chuột vào DropZone
    const dropZone = document.getElementById('dropZone');
    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => { e.preventDefault(); dropZone.classList.add('dragover'); }, false);
    });
    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); }, false);
    });
    dropZone.addEventListener('drop', (e) => {
        const dt = e.dataTransfer;
        if(dt.files.length > 0) processFiles(dt.files);
    });

    function toNoAccentsUpperCase(str) {
        return str
            .normalize('NFD')                     
            .replace(/[\u0300-\u036f]/g, '')     
            .replace(/đ/g, 'd').replace(/Đ/g, 'D') 
            .toUpperCase();                       
    }

    function normalizeInput(inputElement) {
        inputElement.value = toNoAccentsUpperCase(inputElement.value);
        renderFiles(); 
    }

    function processFiles(files) {
        filesArray = [...filesArray, ...Array.from(files)];
        renderFiles();
    }

    function removeFile(index) {
        filesArray.splice(index, 1);
        renderFiles();
    }

    // Làm sạch tên file gốc (Bỏ các ký tự rác hệ thống hay sinh ra)
    function cleanFileName(name) {
        return name
            .replace(/_/g, ' ')
            .replace(/-/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();
    }

    function generateFinalName(fileName, subjectCode) {
        let cleanName = cleanFileName(fileName);
        if (!subjectCode) return cleanName;

        let normalizedFile = toNoAccentsUpperCase(cleanName);
        let normalizedCode = toNoAccentsUpperCase(subjectCode);

        if (normalizedFile.startsWith(normalizedCode)) {
            return cleanName;
        }
        return `${subjectCode} ${cleanName}`;
    }

    function renderFiles() {
        const list = document.getElementById('fileList');
        const code = document.getElementById('subjectCode').value.trim();
        list.innerHTML = '';
        let c = { img: 0, vid: 0, doc: 0 };

        if (filesArray.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#94a3b8; font-size:0.7rem; margin-top:50px;">Chưa có tệp nào</p>';
        }

        filesArray.forEach((f, i) => {
            const final = generateFinalName(f.name, code);
            
            if (f.type.startsWith('image/')) c.img++;
            else if (f.type.startsWith('video/')) c.vid++;
            else c.doc++;

            const row = document.createElement('div');
            row.className = 'file-row';
            row.id = `file-row-${i}`; // Đặt ID cố định để đổi màu trạng thái khi gửi dữ liệu
            row.innerHTML = `
                <span class="btn-delete" onclick="removeFile(${i})">✖</span>
                <span style="color:#94a3b8; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${f.name}</span>
                <span class="new-name-text">➔ ${final}</span>
                <span class="status-badge status-wait" id="status-${i}">Chờ gửi</span>
            `;
            list.appendChild(row);
        });

        document.getElementById('sTotal').innerText = filesArray.length;
        document.getElementById('sImg').innerText = c.img;
        document.getElementById('sVid').innerText = c.vid;
        document.getElementById('sDoc').innerText = c.doc;
        document.getElementById('sendBtn').disabled = filesArray.length === 0;
    }

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    async function startUpload() {
        const code = document.getElementById('subjectCode').value.trim();
        if (!code) { Swal.fire('Lỗi', 'Vui lòng nhập mã môn!', 'warning'); return; }
        
        const btn = document.getElementById('sendBtn');
        const pFill = document.getElementById('pFill');
        const pBar = document.getElementById('pBar');

        // Khóa các nút tương tác tránh người dùng can thiệp đè dữ liệu khi đang gửi
        btn.disabled = true; 
        pBar.style.display = 'block';
        document.querySelectorAll('.btn-delete').forEach(el => el.style.display = 'none');
        
        let total = filesArray.length * TARGET_IDS.length;
        let count = 0;

        for (let i = 0; i < filesArray.length; i++) {
            const file = filesArray[i];
            const finalName = generateFinalName(file.name, code);
            
            const rowEl = document.getElementById(`file-row-${i}`);
            const statusEl = document.getElementById(`status-${i}`);
            
            // Cập nhật giao diện: Đang xử lý file này
            if(rowEl && statusEl) {
                rowEl.className = 'file-row uploading';
                statusEl.className = 'status-badge status-run';
                statusEl.innerText = 'Đang gửi...';
                rowEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            let method = "sendDocument"; 
            let field = "document";

            for (const id of TARGET_IDS) {
                let success = false;
                
                while (!success) {
                    try {
                        const fd = new FormData();
                        fd.append('chat_id', id);
                        fd.append(field, file);
                        fd.append('caption', `📁 File: ${finalName}`);

                        const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${method}`, { 
                            method: 'POST', 
                            body: fd 
                        });
                        
                        const resData = await response.json();

                        if (response.status === 429) {
                            const retryAfter = (resData.parameters && resData.parameters.retry_after) ? resData.parameters.retry_after : 10;
                            if(statusEl) statusEl.innerText = `Chờ hạn mức (${retryAfter}s)`;
                            await sleep((retryAfter + 2) * 1000); 
                            if(statusEl) statusEl.innerText = 'Đang thử lại...';
                            continue; 
                        }

                        if (!response.ok) {
                            console.error("Telegram API Error:", resData);
                            break; 
                        }

                        success = true;
                        count++;
                        pFill.style.width = Math.round((count / total) * 100) + '%';
                        
                        await sleep(1000); 

                    } catch (e) { 
                        console.error("Network Error:", e);
                        if(statusEl) statusEl.innerText = 'Mất mạng, thử lại...';
                        await sleep(5000); 
                    }
                }
            }

            // Gửi xong cả 2 kênh -> Chuyển dòng sang màu xanh hoàn tất
            if(rowEl && statusEl) {
                rowEl.className = 'file-row success';
                statusEl.className = 'status-badge status-done';
                statusEl.innerText = 'Xong ✓';
            }
        }

        await sleep(500);
        Swal.fire({ icon: 'success', title: 'Hoàn tất toàn bộ hàng đợi!', background: '#1e293b', color: '#fff' });
        btn.disabled = false; 
        pBar.style.display = 'none'; 
        pFill.style.width = '0%';
        filesArray = []; 
        renderFiles();
    }

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false; };
</script>
</body>
</html>
