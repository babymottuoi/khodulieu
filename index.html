<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTU Uploader Telegam</title>
    <link rel="icon" href="logoo.png" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff; --secondary: #3a7bd5; --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7); --input-bg: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.1); --danger: #ef4444; --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: none; -webkit-user-select: none; user-select: none; }
        *::-webkit-scrollbar { display: none; }

        html, body { 
            height: 100vh; width: 100vw; overflow: hidden; 
            font-family: 'JetBrains Mono', monospace;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: white; display: flex; justify-content: center; align-items: center;
        }

        .container {
            background: var(--card-bg); backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 20px;
            padding: clamp(15px, 3vh, 30px); width: 98%; max-width: 1400px; height: 95vh;
            display: flex; flex-direction: column; gap: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header { text-align: center; }
        h1 { color: var(--primary); font-size: clamp(1rem, 1vw, 1rem); text-transform: uppercase; letter-spacing: 1px;text-align: center; }

        .main-content { display: grid; grid-template-columns: 350px 1fr; gap: 20px; flex: 1; min-height: 0; }

        /* Left Panel */
        .left-panel { display: flex; flex-direction: column; gap: 15px; }
        .config-box { background: var(--input-bg); padding: 15px; border-radius: 15px; border: 1px solid var(--border); }
        label { display: block; font-size: 0.7rem; color: var(--primary); margin-bottom: 8px; font-weight: bold; }
        input[type="text"] {
            width: 100%; background: rgba(15, 23, 42, 0.8); border: 1px solid #334155;
            padding: 12px; border-radius: 10px; color: white; outline: none; font-size: 0.9rem;
        }

        .upload-options { display: flex; flex-direction: column; gap: 10px; }
        .upload-btn {
            border: 1px dashed var(--border); border-radius: 12px; padding: 12px;
            text-align: center; cursor: pointer; background: rgba(255,255,255,0.02); transition: 0.3s;
        }
        .upload-btn:hover { border-color: var(--primary); background: rgba(0, 210, 255, 0.05); }
        .upload-btn span { display: block; font-size: 0.8rem; font-weight: bold; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; text-align: center; }
        .stat-item { background: rgba(0,0,0,0.2); padding: 8px; border-radius: 10px; font-size: 0.7rem; }
        .stat-item b { display: block; color: var(--primary); font-size: 1rem; }

        /* Right Panel */
        .right-panel {
            background: rgba(0, 0, 0, 0.2); border-radius: 15px; border: 1px solid var(--border);
            display: flex; flex-direction: column; min-height: 0;
        }
        .file-list-header { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 0.75rem; color: var(--primary); font-weight: bold; }
        #fileList { flex: 1; overflow-y: auto; padding: 10px; }
        .file-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.75rem; gap: 10px;
        }
        .file-info { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
        .new-name-text { color: var(--success); font-weight: bold; word-break: break-all; flex: 1; text-align: right; }
        .btn-delete { color: var(--danger); cursor: pointer; padding: 5px; font-weight: bold; }

        /* Actions area */
        .bottom-area { display: flex; flex-direction: column; gap: 10px; }
        .btn-main {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            color: white; font-weight: 700; cursor: pointer; font-size: 0.9rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-storage {
            width: 100%; padding: 12px; border: 1px solid var(--primary); border-radius: 12px;
            color: var(--primary); font-weight: 700; cursor: pointer; font-size: 0.8rem;
            background: transparent; text-align: center; text-decoration: none;
            transition: 0.3s; text-transform: uppercase; display: block;
        }
        .btn-storage:hover { background: var(--primary); color: white; }

        .progress-bar { height: 6px; background: #334155; border-radius: 3px; overflow: hidden; display: none; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); transition: 0.2s; }

        @media (max-width: 850px) {
            .container { height: 98vh; padding: 15px; }
            .main-content { grid-template-columns: 1fr; overflow-y: auto; display: block; }
            .left-panel { margin-bottom: 15px; }
            .right-panel { min-height: 250px; }
            body { overflow-y: auto; height: auto; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Telegam</h1>

    <div class="main-content">
        <div class="left-panel">
            <div class="config-box">
                <label>MÃ MÔN HỌC (VD: ENG 258)</label>
                <input type="text" id="subjectCode" placeholder="Nhập mã môn..." oninput="renderFiles()" autocomplete="off">
            </div>

            <div class="upload-options">
                <div class="upload-btn" onclick="document.getElementById('fileInput').click()">
                    <span>📄 CHỌN TỆP</span>
                    <input type="file" id="fileInput" multiple style="display:none" onchange="processFiles(this.files)">
                </div>
                <div class="upload-btn" onclick="document.getElementById('folderInput').click()">
                    <span>📁 CHỌN THƯ MỤC</span>
                    <input type="file" id="folderInput" webkitdirectory directory style="display:none" onchange="processFiles(this.files)">
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-item"><b id="sTotal">0</b>Tệp</div>
                <div class="stat-item"><b id="sImg">0</b>Ảnh</div>
                <div class="stat-item"><b id="sVid">0</b>Video</div>
                <div class="stat-item"><b id="sDoc">0</b>Khác</div>
            </div>
            
            <div class="bottom-area">
                <div class="progress-bar" id="pBar"><div class="progress-fill" id="pFill"></div></div>
                <button id="sendBtn" class="btn-main" onclick="startUpload()" disabled>GỬI DỮ LIỆU</button>
                <a href="https://t.me/khotailieudtu/2" class="btn-storage" target="_blank">📚 KHO TÀI LIỆU</a>
            </div>
        </div>

        <div class="right-panel">
            <div class="file-list-header">DANH SÁCH FILE CHỜ GỬI</div>
            <div id="fileList">
                <p style="text-align:center; color:#94a3b8; font-size:0.7rem; margin-top:50px;">Chưa có tệp nào</p>
            </div>
        </div>
    </div>
</div>

<script>
    const BOT_TOKEN = "8792491525:AAGI641V9a83gMUi47isyqtMLq2gc3RHi4U";
    const TARGET_IDS = [
      "-1003770539054",
      "-1003194062731"
    ];
    
    let filesArray = [];

    function processFiles(files) {
        filesArray = [...filesArray, ...Array.from(files)];
        renderFiles();
    }

    function removeFile(index) {
        filesArray.splice(index, 1);
        renderFiles();
    }

    function renderFiles() {
        const list = document.getElementById('fileList');
        const code = document.getElementById('subjectCode').value.trim();
        list.innerHTML = '';
        let c = { img: 0, vid: 0, doc: 0 };

        if (filesArray.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#94a3b8; font-size:0.7rem; margin-top:50px;">Chưa có tệp nào</p>';
        }

        filesArray.forEach((f, i) => {
            const final = code ? `${code} ${f.name.replace(/_/g, ' ')}` : f.name.replace(/_/g, ' ');
            if (f.type.startsWith('image/')) c.img++;
            else if (f.type.startsWith('video/')) c.vid++;
            else c.doc++;

            const row = document.createElement('div');
            row.className = 'file-row';
            row.innerHTML = `
                <div class="file-info">
                    <span class="btn-delete" onclick="removeFile(${i})">✖</span>
                    <span style="color:#94a3b8; overflow:hidden; text-overflow:ellipsis;">${f.name}</span>
                </div>
                <span class="new-name-text">➔ ${final}</span>
            `;
            list.appendChild(row);
        });

        document.getElementById('sTotal').innerText = filesArray.length;
        document.getElementById('sImg').innerText = c.img;
        document.getElementById('sVid').innerText = c.vid;
        document.getElementById('sDoc').innerText = c.doc;
        document.getElementById('sendBtn').disabled = filesArray.length === 0;
    }

    // Hàm delay chống spam
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    async function startUpload() {
        const code = document.getElementById('subjectCode').value.trim();
        if (!code) { Swal.fire('Lỗi', 'Vui lòng nhập mã môn!', 'warning'); return; }
        
        const btn = document.getElementById('sendBtn');
        const pFill = document.getElementById('pFill');
        const pBar = document.getElementById('pBar');

        btn.disabled = true; pBar.style.display = 'block';
        let total = filesArray.length * TARGET_IDS.length, count = 0;

        for (const file of filesArray) {
            const finalName = `${code} ${file.name.replace(/_/g, ' ')}`;
            let method = "sendDocument", field = "document";
            if (file.type.startsWith('image/')) { method = "sendPhoto"; field = "photo"; }
            else if (file.type.startsWith('video/')) { method = "sendVideo"; field = "video"; }

            for (const id of TARGET_IDS) {
                try {
                    const fd = new FormData();
                    fd.append('chat_id', id);
                    fd.append(field, file);
                    // Thêm dấu thời gian nhỏ vào caption để chống trùng lặp nội dung hoàn toàn
                    fd.append('caption', `📁 File: ${finalName}`);

                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${method}`, { method: 'POST', body: fd });
                    
                    if (response.status === 429) {
                        const retryAfter = (await response.json()).parameters.retry_after || 5;
                        await sleep(retryAfter * 1000); // Chờ đúng thời gian Telegram yêu cầu
                    }

                    count++;
                    pFill.style.width = Math.round((count / total) * 100) + '%';
                    
                    // Delay an toàn giữa các lần gửi (350ms)
                    await sleep(350); 

                } catch (e) { console.error(e); }
            }
        }

        Swal.fire({ icon: 'success', title: 'Hoàn tất!', background: '#1e293b', color: '#fff' });
        btn.disabled = false; pBar.style.display = 'none'; pFill.style.width = '0%';
        filesArray = []; renderFiles();
    }

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false; };
</script>
</body>
</html>
